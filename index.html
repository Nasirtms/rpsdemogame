<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | GameVault2.0</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      #rotate-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: rgba(0,0,0,0.92);
        color: #fff;
        z-index: 9999;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      #rotate-overlay img {
        width: min(140px, 40vw);
        height: auto;
        filter: drop-shadow(0 10px 24px rgba(0,0,0,0.5));
      }
      #rotate-overlay .rotate-hint {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        line-height: 1.35;
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <div id="rotate-overlay" aria-hidden="true">
        <img
          src="TemplateData/rotate-device-anim.svg"
          alt="Rotate device to landscape"
          onerror="this.onerror=null; this.src='TemplateData/rotate-device.svg';"
        >
        <div class="rotate-hint">Rotate your device to landscape.</div>
      </div>
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-loading-text" style="margin-top:10px;font-family:arial;font-size:14px;color:#fff;text-align:center;opacity:.85;">
          Downloading…
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var loadingText = document.querySelector("#unity-loading-text");
      var warningBanner = document.querySelector("#unity-warning");
      var rotateOverlay = document.querySelector("#rotate-overlay");
      var unityInstanceRef = null;
      var pendingFullscreen = false;
      var fullscreenArmed = false;

      // Enable asset caching for faster reloads/offline support.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((err) => {
            console.warn("Service worker registration failed:", err);
          });
        });
      }

      const isInFullscreen = () =>
        !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);

      const requestBrowserFullscreen = () => {
        if (isInFullscreen()) return;

        const tryRequest = (el) => {
          if (!el) return false;
          const fn =
            el.requestFullscreen ||
            el.webkitRequestFullscreen ||
            el.msRequestFullscreen;
          if (!fn) return false;
          try {
            const p = fn.call(el);
            if (p && typeof p.catch === "function") {
              p.catch((err) => console.warn("Fullscreen request blocked:", err));
            }
            return true;
          } catch (err) {
            console.warn("Fullscreen request failed:", err);
            return false;
          }
        };

        // Fullscreen the container so HTML overlays (rotate + loader UI) stay visible.
        if (tryRequest(container)) return;
        if (tryRequest(canvas)) return;
        tryRequest(document.documentElement);
      };

      const enterFullscreen = () => {
        // Only request fullscreen from a user gesture.
        pendingFullscreen = true;

        // Prefer browser fullscreen API (more consistent).
        requestBrowserFullscreen();

        // Fallback: if fullscreen API isn't available/supported, try Unity.
        const hasFsApi = !!(
          canvas.requestFullscreen || canvas.webkitRequestFullscreen || canvas.msRequestFullscreen ||
          container.requestFullscreen || container.webkitRequestFullscreen || container.msRequestFullscreen ||
          document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || document.documentElement.msRequestFullscreen
        );
        if (!hasFsApi && unityInstanceRef) {
          try { unityInstanceRef.SetFullscreen(1); } catch (err) { console.warn("Unity fullscreen failed:", err); }
        }

        pendingFullscreen = false;
      };

      const armFullscreenGesture = () => {
        if (fullscreenArmed) return;
        fullscreenArmed = true;

        const handler = () => {
          fullscreenArmed = false;
          if (!isInFullscreen() && rotateOverlay.style.display !== "flex") enterFullscreen();
        };

        // Capture the next user gesture as early as possible (even during loading).
        // Note: once Unity is running, it may stop event bubbling on the canvas.
        // To ensure we still see a user gesture, listen on both window and canvas/container,
        // and do it in capture phase.
        const targets = [window, container, canvas].filter(Boolean);
        ["pointerdown", "touchend", "click"].forEach((eventName) => {
          targets.forEach((t) => t.addEventListener(eventName, handler, { once: true, capture: true }));
        });
      };

      // Arm initially, and re-arm whenever the user exits fullscreen.
      armFullscreenGesture();
      ["fullscreenchange", "webkitfullscreenchange", "MSFullscreenChange"].forEach((eventName) => {
        document.addEventListener(eventName, () => {
          if (!isInFullscreen()) armFullscreenGesture();
        });
      });

      const isMobile = () => {
        // iPadOS can report as Mac; userAgent checks alone are unreliable.
        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) return true;
        if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) return true; // iPadOS Safari
        if (window.matchMedia && window.matchMedia("(pointer: coarse)").matches) return true; // many mobile browsers
        return false;
      };
      const isPortrait = () => {
        if (window.matchMedia) return window.matchMedia("(orientation: portrait)").matches;
        return window.innerHeight > window.innerWidth;
      };

      const updateOrientationUI = () => {
        if (!isMobile()) {
          rotateOverlay.style.display = "none";
          rotateOverlay.setAttribute("aria-hidden", "true");
          return;
        }

        if (isPortrait()) {
          rotateOverlay.style.display = "flex";
          rotateOverlay.setAttribute("aria-hidden", "false");
        } else {
          rotateOverlay.style.display = "none";
          rotateOverlay.setAttribute("aria-hidden", "true");
        }
      };

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/RPSDemo.loader.js";
      var config = {
        dataUrl: buildUrl + "/RPSDemo.data.unityweb",
        frameworkUrl: buildUrl + "/RPSDemo.framework.js.unityweb",
        codeUrl: buildUrl + "/RPSDemo.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "TMS",
        productName: "GameVault2.0",
        productVersion: "0.0.1",
        showBanner: unityShowBanner,
      };



      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "1920px";
        canvas.style.height = "1080px";
      }

      updateOrientationUI();
      window.addEventListener("resize", updateOrientationUI, { passive: true });
      window.addEventListener("orientationchange", updateOrientationUI, { passive: true });
      ["fullscreenchange", "webkitfullscreenchange", "MSFullscreenChange"].forEach((eventName) => {
        document.addEventListener(eventName, updateOrientationUI, { passive: true });
      });

      loadingBar.style.display = "block";

      // Smooth the visual progress bar so it doesn't jump (0→90→100).
      var targetProgress = 0;
      var visualProgress = 0;
      var progressRaf = 0;
      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const startProgressAnimation = () => {
        if (progressRaf) return;
        const tick = () => {
          const delta = targetProgress - visualProgress;
          const step = Math.max(0.0025, Math.min(0.035, Math.abs(delta) * 0.18));
          visualProgress += Math.sign(delta) * Math.min(Math.abs(delta), step);
          visualProgress = clamp01(visualProgress);
          if (progressBarFull) progressBarFull.style.width = (visualProgress * 100).toFixed(2) + "%";

          if (Math.abs(targetProgress - visualProgress) < 0.0005 && targetProgress >= 1) {
            progressRaf = 0;
            return;
          }
          progressRaf = requestAnimationFrame(tick);
        };
        progressRaf = requestAnimationFrame(tick);
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          // Keep the bar moving a bit during initialization: map 0..0.9 to 0..0.97
          // so it doesn't look stuck at 90% while WASM compiles/initializes.
          const mapped = progress < 0.9 ? (progress / 0.9) * 0.97 : 0.97 + (progress - 0.9) * 0.03 / 0.1;
          targetProgress = clamp01(mapped);
          startProgressAnimation();
          if (loadingText) {
            if (progress < 0.9) loadingText.textContent = "Downloading…";
            else if (progress < 1) loadingText.textContent = "Initializing…";
            else loadingText.textContent = "Starting…";
          }
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                unityInstanceRef = unityInstance;
                targetProgress = 1;
                startProgressAnimation();
                // Don't auto-enter fullscreen here: browsers require a user gesture.
                pendingFullscreen = false;
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
